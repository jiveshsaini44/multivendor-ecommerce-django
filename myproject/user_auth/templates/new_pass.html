{% extends 'main.html' %}

{% block content %}

<div class="reset-container">

    <div class="reset-box">

        <h2>Reset Password</h2>

        {% if wrong %}
            <p class="error">Old password is incorrect</p>
        {% endif %}

        {% if same %}
            <p class="error">New password cannot be same as old password</p>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <input type="text" value="{{ request.user.username }}" readonly>

            {% if new_pass %}
                <input type="password" name="newpasw" placeholder="Enter new password" required>
            {% else %}
                <input type="password" name="oldpasw" placeholder="Enter old password" required>
            {% endif %}

            <button type="submit">Submit</button>
        </form>

    </div>

</div>

{% endblock %}
